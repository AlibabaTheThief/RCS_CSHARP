name: Deploy Azeri for Dad to GitHub Pages

# Builds the PWA and publishes it to GitHub Pages so it can be opened on a
# phone and installed via "Add to Home Screen". Runs on pushes to the dev
# branch and can be triggered manually.
on:
  push:
    branches: [master, claude/azeri-learning-app-whv2tn]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # --- Generate Azerbaijani pronunciation audio in CI (no desktop needed) ---
      # GitHub runners have open internet, so free gTTS can synthesise the mp3s
      # here at deploy time and bundle them. Cache keyed on the seed content so
      # audio only regenerates when cards.seed.json changes.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Cache generated audio
        uses: actions/cache@v4
        with:
          path: public/audio
          key: azeri-audio-${{ hashFiles('data/cards.seed.json') }}
      - name: Generate audio (gTTS)
        run: |
          python -m pip install --quiet gTTS
          python scripts/generate_audio.py

      - run: npm run build
      # NOTE: Enable Pages once in repo Settings → Pages → Source: "GitHub
      # Actions". The Actions token cannot create the Pages site itself.
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
