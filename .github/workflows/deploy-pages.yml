name: Deploy Azeri for Dad to GitHub Pages

# Builds the PWA and publishes it to GitHub Pages so it can be opened on a
# phone and installed via "Add to Home Screen". Publishes only from the
# default branch (GitHub Pages restricts deployments to it); can also be run
# manually. Develop on the dev branch, then fast-forward master to publish.
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Gate the deploy on correctness — never publish a broken build.
      - run: npm run typecheck
      - run: npm run test

      # --- Generate Azerbaijani pronunciation audio in CI (no desktop needed) ---
      # GitHub runners have open internet, so we synthesise the mp3s here at
      # deploy time and bundle them. Primary: edge-tts (free Microsoft neural
      # az-AZ voices, reliable from datacenter IPs). Fallback: gTTS. Cache keyed
      # on the seed content so audio only regenerates when cards.seed.json changes.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Cache generated audio
        uses: actions/cache@v4
        with:
          path: public/audio
          key: azeri-audio-edge-${{ hashFiles('data/cards.seed.json') }}
      - name: Generate audio (edge-tts neural az-AZ, gTTS fallback)
        run: |
          python -m pip install --quiet edge-tts gTTS
          python scripts/generate_audio_edge.py || python scripts/generate_audio.py

      - run: npm run build
      # NOTE: Enable Pages once in repo Settings → Pages → Source: "GitHub
      # Actions". The Actions token cannot create the Pages site itself.
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
