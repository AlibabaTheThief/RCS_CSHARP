name: Deploy Azeri for Dad to GitHub Pages

# Builds the PWA and publishes it to GitHub Pages so it can be opened on a
# phone and installed via "Add to Home Screen". Runs on pushes to the dev
# branch and can be triggered manually.
on:
  push:
    branches: [claude/azeri-learning-app-whv2tn]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
        with:
          # Auto-provision Pages (source: GitHub Actions) so no manual setup
          # is needed in repo settings.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
